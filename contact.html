<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body onload="initContactForm();">
  <!-- ===== Header ===== -->
  <header class="header">
    <div class="logo">Samyak Jain</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="projects.html">Projects</a>
      <a href="skills.html">Skills</a>
      <a href="resume.html">Resume</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
    <button id="theme-toggle" class="theme-btn" aria-label="Toggle theme">
      <span class="theme-icon" aria-hidden="true"></span>
    </button>
  </header>

  <!-- ===== Contact Section ===== -->
  <main>
    <h2 class="section-title">Let’s Work Together</h2>

    <div class="contact-grid">
      <!-- Contact Form -->
      <div class="contact-card">
        <h3><i class="fas fa-paper-plane"></i> Send a Message</h3>
        <form id="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your project..." required></textarea>
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn">Send Message</button>
            <button type="reset" class="btn outline">Reset</button>
          </div>
        </form>
      </div>

      <!-- Contact Info -->
      <div class="contact-card">
        <h3><i class="fas fa-address-card"></i> Get in Touch</h3>
        <div class="contact-info-item">
          <i class="fas fa-envelope"></i>
          <span id="email-link">samyakj1978@gmail.com</span>
          <button id="copy-email" class="copy-btn" data-email="samyakj1978@gmail.com" title="Copy Email">
            <i class="fas fa-copy"></i>
          </button>
        </div>
        <div class="contact-info-item">
          <i class="fas fa-phone"></i>
          <span>+91 9760170352</span>
        </div>
        <div class="contact-info-item">
          <i class="fas fa-map-marker-alt"></i>
          <span>Meerut, India</span>
        </div>

        <div class="social-links">
          <a href="https://github.com/SamR202" target="_blank" class="social-btn">
            <i class="fab fa-github"></i> GitHub
          </a>
          <a href="https://www.linkedin.com/in/samyak-jain-614b39314" target="_blank" class="social-btn">
            <i class="fab fa-linkedin"></i> LinkedIn
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="footer">© <span id="year"></span> Samyak Jain</footer>

  <script src="script.js"></script>
</body>
</html>
